<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Pizza Uno Sunderland</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .checkout-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }

        .checkout-container h2 {
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 5px;
        }

        .checkout-summary p {
            font-size: 1.1em;
        }

        .place-order {
            background: #e74c3c;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
            width: 100%;
            margin-top: 20px;
        }

        .place-order:hover {
            background: #c0392b;
        }
    </style>
</head>

<body>
<header>
    <div class="logo">
            <img src="Logo.png">
        </div>
        <h1>PIZZA UNO SUNDERLAND</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="#order">Order Online</a>
            <a href="#feedback">Feedback</a>
            <a href="contact.html">Contact Us</a>
            <a href="login.html">Login</a>
        </nav>
</header>

<main>
    <div class="checkout-container">
        <h2>Checkout</h2>
        <p>Please review your order before placing it.</p>

        <div class="checkout-summary">
            <p><strong>Subtotal:</strong> <span id="checkout-subtotal">£0.00</span></p>
            <p><strong>Delivery:</strong> £2.50</p>
            <hr>
            <p><strong>Total:</strong> <span id="checkout-total">£0.00</span></p>
        </div>

        <button class="place-order">Place Order</button>
    </div>
</main>

<footer>
    <p>&copy; 2026 Pizza Uno Sunderland | <a href="policy.html">Terms & Cookie Policy</a></p>
</footer>

<script>
    const subtotal = sessionStorage.getItem("checkoutSubtotal") || "0.00";
    const total = sessionStorage.getItem("checkoutTotal") || "0.00";

    document.getElementById("checkout-subtotal").textContent = `£${subtotal}`;
    document.getElementById("checkout-total").textContent = `£${total}`;

    document.querySelector(".place-order").addEventListener("click", () => {
        alert("✅ Your order has been placed!");
        window.location.href = "index.html";
    });
</script>

</body>
</html>
