<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Pizza Uno Sunderland</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">
                <img src="Logo.png" alt="Pizza Uno logo">
            </div>
            <div class="site-title">
                <h1>PIZZA UNO SUNDERLAND</h1>
                <p>Review your basket and place your order.</p>
            </div>
            <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
            <nav id="site-nav">
                <a href="index.html">Home</a>
                <a href="order.html" class="active">Order Online</a>
                <a href="feedback.html">Feedback</a>
                <a href="contact.html">Contact Us</a>
                <a href="login.html">Login</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="checkout-container">
            <h2>Checkout</h2>
            <p>Please review your order before placing it.</p>
            <div class="checkout-summary">
                <p><strong>Subtotal:</strong> <span id="checkout-subtotal">£0.00</span></p>
                <p><strong>Delivery:</strong> £2.50</p>
                <hr>
                <p><strong>Total:</strong> <span id="checkout-total">£0.00</span></p>
            </div>
            <button class="place-order" type="button">Place Order</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Pizza Uno Sunderland | <a href="policy.html">Terms &amp; Cookie Policy</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
